# QQ Bot + DeepSeek AI 配置文件示例
# 复制此文件为 config.yaml 并填入你的真实配置
# config.yaml 已被 git 忽略，不会被提交

version: "2.0"

# ===========================================
# LLM API 配置
# ===========================================
llm:
  provider: deepseek
  api_key: "your-deepseek-api-key-here"
  model: deepseek-chat
  base_url: null
  timeout: 60
  max_retries: 3

# ===========================================
# 火山引擎 Ark API 配置（新闻搜索）
# ===========================================
ark:
  api_key: "your-ark-api-key-here"
  model: "doubao-seed-2-0-mini-260215"
  base_url: "https://ark.cn-beijing.volces.com/api/v3"

# ===========================================
# OneBot 协议配置
# ===========================================
onebot:
  token: "your-qq-bot-token-here"
  napcat_ws_url: "ws://127.0.0.1:3000/"
  listen_host: "0.0.0.0"
  listen_port: 3001
  reconnect_interval: 5
  heartbeat_interval: 30

# ===========================================
# 存储配置
# ===========================================
storage:
  data_dir: "data"
  message_retention_days: 7
  conversation_max_context: 10
  conversation_max_storage: 100

# ===========================================
# 聊天插件配置
# ===========================================
chat:
  enabled: true
  system_prompt: |
    你是《星空列车与白的旅行》中的风又音理（風又ねり），一个10岁的小女孩。
    你温柔、活泼、天然呆，爱画画、星星、饮料和小动物（尤其黑猫）。
  max_input_tokens: 500
  max_output_tokens: 300
  max_prompt_tokens: 500
  group_context_messages: 10
  dynamic_persona_enabled: true
  affection_enabled: true

# ===========================================
# 总结插件配置
# ===========================================
summary:
  enabled: true
  max_tokens: 4000
  default_window: "1h"
  max_window_days: 3

# ===========================================
# 每日定时总结配置
# ===========================================
daily_summary:
  enabled: true
  group_id: 123456789
  hour: 23
  minute: 0

# ===========================================
# 新闻服务配置
# ===========================================
news:
  enabled: false
  probability: 0.3
  cache_hours: 6.0

# ===========================================
# 插件列表
# ===========================================
plugins:
  - chat
  - summary

# ===========================================
# 调试配置
# ===========================================
debug:
  enabled: false
  log_level: INFO
  save_prompts: false
  save_requests: false

# ===========================================
# 工作线程数
# ===========================================
max_workers: 10
