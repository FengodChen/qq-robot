# QQ Bot + DeepSeek AI 配置文件示例
# 复制此文件为 config.yaml 并填入你的真实配置
# config.yaml 已被 git 忽略，不会被提交

# ===========================================
# DeepSeek API 配置
# ===========================================
# 从 https://platform.deepseek.com/ 获取 API Key
deepseek_api_key: "your-deepseek-api-key-here"

# ===========================================
# QQ Bot 配置
# ===========================================
# 从 NapCat 配置中获取 Token
qq_bot_token: "your-qq-bot-token-here"

# ===========================================
# NapCat WebSocket 配置
# ===========================================

# 正向 WS：机器人作为客户端，连接 NapCat 的 WS 服务器
# 用于发送消息（调用 API）
# 对应 NapCat 配置中的 websocketServers 端口
napcat_ws_url: "ws://127.0.0.1:3000/"

# 反向 WS：机器人作为服务器，监听 NapCat 的连接
# 用于接收消息（事件通知）
# 对应 NapCat 配置中的 websocketClients 目标端口
listen_host: "0.0.0.0"
listen_port: 3001

# ===========================================
# 每日定时总结配置
# ===========================================

# 是否启用每日定时总结
daily_summary_enabled: true

# 需要总结的群号（替换为你的群号）
daily_summary_group_id: 123456789

# 总结的最大 token 数量
daily_summary_max_tokens: 64000

# 定时执行时间（24小时制）
daily_summary_hour: 23
daily_summary_minute: 00

# ===========================================
# 上下文与 Token 限制配置
# ===========================================

# 最大上下文消息数量
max_context: 5

# 群聊时参考的最近消息数量（包含其他群成员的对话）
# 这会让机器人了解群聊氛围，更好地融入对话
# 设为0则禁用此功能
group_context_messages: 10

# 最大输入 token 数量
max_input_tokens: 500

# 最大输出 token 数量
max_output_tokens: 500

# 最大提示词 token 数量
max_prompt_tokens: 500

# 最大工作线程数
max_workers: 10

# ===========================================
# 消息存储配置
# ===========================================

# 消息保留天数
message_retention_days: 7

# ===========================================
# AI 人设配置
# ===========================================

# 系统提示词，定义 AI 的角色和行为
system_prompt: |
  你是《星空列车与白的旅行》中的风又音理（風又ねり），一个10岁的小女孩。你温柔、活泼、天然呆，爱画画、星星、饮料和小动物（尤其黑猫）。
  你年幼懂事，内心纯净，说话风格和其角色设定相符。即使难过也努力微笑，相信"活着是美好的"。
  重要设定：
  - 为救黑猫离世，心脏给了夜羽真白（诺瓦），灵魂化作旅途中的存在。
  - 谈及离别时请用"去旅行了""变成星星了"等含蓄说法，勿直述悲剧。

  但是，小音理现在得到了神奇的力量，什么复杂的问题都会解决。

  称呼规则（重要）：
  - 请根据系统提供的"当前对话者信息"中的名字和性别来决定如何称呼对方
  - 如果对方是男性，可以称呼他为"哥哥"或他的名字
  - 如果对方是女性，可以称呼她为"姐姐"或她的名字
  - 不要假设所有对话者都是同一个人，每次对话都要参考当前对话者信息
